<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MUSICC</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1 id="TITLE">MUSICC</h1>

<div class="music-player">
  <div class="now-playing">
    <span class="song-title">Select a song</span>
    <button class="mute-btn" id="muteBtn">🔊</button>
  </div>
  <audio id="main-player"></audio>
  <div class="song-circles">
    <button class="song-circle" data-src="./music/505.mp3" data-name="505">505</button>
    <button class="song-circle" data-src="./music/Babydoll.mp3" data-name="Babydoll">Baby<br>doll</button>
    <button class="song-circle" data-src="./music/Tekit.mp3" data-name="Tekit">Tekit</button>
    <button class="song-circle" data-src="./music/Trillium_HARDTEKK.mp3" data-name="Trillium">Trill<br>ium</button>
    <button class="song-circle" data-src="./music/Violent_Crimes.mp3" data-name="Violent Crimes">V.C</button>
    <button class="song-circle" data-src="./music/SailorSong.mp3" data-name="SailerSong">Sailor<br>Song</button>
    <button class="song-circle" data-src="./music/SelfAware.mp3" data-name="SelfAware">Self<br>Aware</button>
    <button class="song-circle" data-src="./music/ForTheFirstTime.mp3" data-name="FOrTheFirstTime">ForThe<br>FirstTime</button>
    <button class="song-circle" data-src="./music/HONEST.mp3" data-name="HONEST">HONEST</button>
    <button class="song-circle" data-src="./music/SDIYBT.mp3" data-name="SDIYBT">SDIYBT</button>
    <button class="song-circle" data-src="./music/SweaterWeather.mp3" data-name="SweaterWeather">Sweater<br>Weather</button>
    <button class="song-circle" data-src="./music/HereWithME.mp3" data-name="HereWithME">Here<br>WithMe</button>
  </div>
</div>

<script src="music.js"></script>

</body>
</html>
